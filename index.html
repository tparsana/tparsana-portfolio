    <style>
      html.boot-loading,
      html.boot-loading body {
        overflow: hidden;
      }

      body {
        margin: 0;
        background: #000;
      }

      #boot-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
        opacity: 1;
        transition: opacity 650ms ease;
      }

      #boot-loader.is-exiting {
        opacity: 0;
        pointer-events: none;
      }

      .boot-loader__inner {
        width: min(88vw, 46rem);
        min-height: 8rem;
        display: grid;
        place-items: center;
        padding: 0 1.5rem;
      }

      #boot-loader-text {
        width: 100%;
      }

      .boot-loader__fallback {
        margin: 0;
        color: rgba(255, 255, 255, 0.96);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: clamp(1.35rem, 2vw, 2rem);
        font-weight: 400;
        letter-spacing: -0.03em;
        line-height: 1.3;
        text-align: center;
      }
    </style>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-5CQFWPBP67"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
    
      gtag('config', 'G-5CQFWPBP67');
    </script>
  </head>

  <body>
    <div id="boot-loader" aria-live="polite">
      <div class="boot-loader__inner">
        <div id="boot-loader-text">
          <p class="boot-loader__fallback">My goal is to make an impact...</p>
        </div>
      </div>
    </div>
    <div id="root"></div>
    <script>
      (() => {
        const root = document.documentElement;
        const loader = document.getElementById("boot-loader");

        if (!loader) {
          return;
        }

        root.classList.add("boot-loading");

        let appReady = false;
        let sequenceComplete = false;
        let hasExited = false;

        const exitLoader = () => {
          if (hasExited || !appReady || !sequenceComplete) {
            return;
          }

          hasExited = true;
          loader.classList.add("is-exiting");

          window.setTimeout(() => {
            loader.remove();
            root.classList.remove("boot-loading");
          }, 650);
        };

        window.setTimeout(() => {
          sequenceComplete = true;
          exitLoader();
        }, 7000);

        window.addEventListener(
          "portfolio-app-ready",
          () => {
            appReady = true;
            exitLoader();
          },
          { once: true }
        );

        window.addEventListener(
          "portfolio-loader-sequence-complete",
          () => {
            sequenceComplete = true;
            exitLoader();
          },
          { once: true }
        );

        window.addEventListener(
          "load",
          () => {
            if (!appReady) {
              appReady = true;
              exitLoader();
            }
          },
          { once: true }
        );
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>

  </body>
